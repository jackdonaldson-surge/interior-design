<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interior Design</title>
  <style>
    html, body { margin: 0; min-height: 100vh; background: #f5f5f7; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    #app-header { height: 56px; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    #app-main { flex: 1; display: flex; min-height: 0; }
    #app-content { flex: 1; padding: 24px; overflow: auto; background: #f5f5f7; }
    .nav-sidebar { width: 220px; flex-shrink: 0; background: #fff; border-right: 1px solid rgba(0,0,0,0.08); padding: 16px 0; }
    .nav-sidebar a { display: block; padding: 8px 24px; color: #6e6e73; text-decoration: none; border-left: 3px solid transparent; }
    .nav-sidebar a:hover { background: #fafafa; color: #1d1d1f; }
    .nav-sidebar a.active { color: #0071e3; border-left: 3px solid #0071e3; background: rgba(0,113,227,0.06); }
  </style>
</head>
<body>
  <div id="app">
    <header id="app-header" class="app-header">
      <div class="header-left"><a href="#/" class="logo" style="font-weight:600;color:#1d1d1f;">Interior Design</a></div>
    </header>
    <main id="app-main" class="app-main">
      <nav class="nav-sidebar">
        <a href="#/" class="active">Projects</a>
      </nav>
      <div class="content-area" id="app-content" style="flex:1;padding:24px;">
        <p style="color:#6e6e73;">Loading app…</p>
      </div>
    </main>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
